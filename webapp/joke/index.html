<!DOCTYPE html>
<html>
<head>
  <title>Funny Joke</title>
</head>
<body style="background-color:rgb(192, 255, 34);">
  <h1>Look at this hilarious joke</h1>
  <video id="video" autoplay playsinline></video>
  <button onclick="startCamera()" id="activate">activate the joke</button>
  <br>
  <img src="spongebob.png" alt="notin" hidden="true" id="spongebob">
  <p id = 'error' style="font-size: 30px; color: red;"></p>
  <script>
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const videoElement = document.getElementById('video');
        videoElement.srcObject = stream;
        document.getElementById('spongebob').hidden = false;
      } catch (err) {
        document.getElementById('error').innerHTML = "<b>Turn on your camera for it to work :)</b>";
      }
    }
  </script>
  <p>Just turn on your camera for it to work!</p>
</body>
</html>
